<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projects | Portfolio Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&amp;display=swap" rel="stylesheet"/>
  <link href="admin.css" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { primary: '#14b8a6', 'background-dark': '#0f172a', sidebar: '#0e1628' },
          fontFamily: { display: ['Inter', 'sans-serif'] }
        }
      }
    };
  </script>
</head>
<body class="bg-background-dark font-display text-slate-100 antialiased min-h-screen">
  <div class="flex">
    <aside class="admin-sidebar fixed inset-y-0 left-0 w-64 bg-sidebar border-r border-slate-700 flex flex-col z-50">
      <div class="p-5 border-b border-slate-700">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-primary text-2xl">admin_panel_settings</span>
          <span class="font-bold text-white">Portfolio Admin</span>
        </div>
      </div>
      <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
        <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition"> <span class="material-symbols-outlined">dashboard</span> Dashboard </a>
        <a href="manage-posts.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition"> <span class="material-symbols-outlined">article</span> Blog Posts </a>
        <a href="manage-projects.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-white bg-primary/20 border-l-4 border-primary"> <span class="material-symbols-outlined">folder_open</span> Projects </a>
        <a href="manage-services.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition"> <span class="material-symbols-outlined">work</span> Services </a>
      </nav>
      <div class="p-3 border-t border-slate-700">
        <button type="button" id="logout-btn" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-red-900/30 hover:text-red-400 transition"><span class="material-symbols-outlined">logout</span> Logout</button>
      </div>
    </aside>
    <main class="flex-1 ml-64 p-8">
      <div class="max-w-4xl">
        <div class="flex flex-wrap items-center justify-between gap-4 mb-8">
          <div>
            <h1 class="text-2xl font-bold text-white">Projects</h1>
            <p class="text-slate-400 text-sm mt-1">Manage portfolio projects. Title, description, technologies, GitHub & demo links.</p>
          </div>
          <button type="button" id="btn-add" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-primary text-slate-900 font-semibold hover:bg-teal-400 transition">
            <span class="material-symbols-outlined">add</span> Add Project
          </button>
        </div>
        <div id="projects-list" class="space-y-4"></div>
      </div>
    </main>
  </div>

  <div id="project-modal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-hidden="true">
    <div class="flex min-h-full items-center justify-center p-4">
      <div class="fixed inset-0 bg-black/60" id="modal-backdrop"></div>
      <div class="relative w-full max-w-lg rounded-2xl border border-slate-700 bg-slate-800 shadow-xl">
        <div class="p-6 border-b border-slate-700">
          <h2 id="modal-title" class="text-xl font-bold text-white">Add Project</h2>
        </div>
        <form id="project-form" class="p-6 space-y-4">
          <input type="hidden" id="project-id"/>
          <div>
            <label for="project-title" class="block text-sm font-medium text-slate-300 mb-1">Project Title</label>
            <input type="text" id="project-title" required class="w-full px-4 py-2 rounded-xl bg-slate-800 border border-slate-600 text-white focus:border-primary outline-none" placeholder="My Awesome App"/>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">Project photo</label>
            <div class="flex items-center gap-4">
              <div class="size-20 rounded-lg border border-slate-600 overflow-hidden bg-slate-800 flex-shrink-0">
                <img id="project-image-preview" src="" alt="" class="size-full object-cover hidden"/>
                <span id="project-image-placeholder" class="size-full flex items-center justify-center text-slate-500"><span class="material-symbols-outlined text-2xl">image</span></span>
              </div>
              <div>
                <input type="file" id="project-image-input" accept="image/*" class="sr-only"/>
                <button type="button" id="project-image-btn" class="px-3 py-2 rounded-lg bg-slate-700 text-slate-300 text-sm font-medium hover:bg-slate-600 transition">Choose image</button>
              </div>
            </div>
          </div>
          <div>
            <label for="project-description" class="block text-sm font-medium text-slate-300 mb-1">Description</label>
            <textarea id="project-description" rows="3" class="w-full px-4 py-2 rounded-xl bg-slate-800 border border-slate-600 text-white focus:border-primary outline-none resize-none" placeholder="What the project does"></textarea>
          </div>
          <div>
            <label for="project-technologies" class="block text-sm font-medium text-slate-300 mb-1">Technologies (comma-separated)</label>
            <input type="text" id="project-technologies" class="w-full px-4 py-2 rounded-xl bg-slate-800 border border-slate-600 text-white focus:border-primary outline-none" placeholder="React, Node, Tailwind"/>
          </div>
          <div>
            <label for="project-category" class="block text-sm font-medium text-slate-300 mb-1">Category (for filter)</label>
            <select id="project-category" class="w-full px-4 py-2 rounded-xl bg-slate-800 border border-slate-600 text-white focus:border-primary outline-none">
              <option value="web-development">Web Development</option>
              <option value="react-development">React Development</option>
              <option value="mobile-app">Mobile App Development</option>
              <option value="wordpress">WordPress Development</option>
              <option value="desktop">Desktop</option>
              <option value="blogger">Blogger</option>
            </select>
          </div>
          <div>
            <label for="project-github" class="block text-sm font-medium text-slate-300 mb-1">GitHub Link</label>
            <input type="url" id="project-github" class="w-full px-4 py-2 rounded-xl bg-slate-800 border border-slate-600 text-white focus:border-primary outline-none" placeholder="https://github.com/..."/>
          </div>
          <div>
            <label for="project-demo" class="block text-sm font-medium text-slate-300 mb-1">Demo Link</label>
            <input type="url" id="project-demo" class="w-full px-4 py-2 rounded-xl bg-slate-800 border border-slate-600 text-white focus:border-primary outline-none" placeholder="https://..."/>
          </div>
          <div class="flex gap-3 pt-2">
            <button type="submit" class="flex-1 py-2 rounded-xl bg-primary text-slate-900 font-semibold hover:bg-teal-400 transition">Save</button>
            <button type="button" id="modal-cancel" class="flex-1 py-2 rounded-xl bg-slate-700 text-slate-300 font-medium hover:bg-slate-600 transition">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
  <script>
    (function () {
      if (!PortfolioAdmin.requireAuth()) return;
      var listEl = document.getElementById('projects-list');
      var modal = document.getElementById('project-modal');
      var form = document.getElementById('project-form');
      var modalTitle = document.getElementById('modal-title');
      var idEl = document.getElementById('project-id');
      var titleEl = document.getElementById('project-title');
      var descEl = document.getElementById('project-description');
      var techEl = document.getElementById('project-technologies');
      var catEl = document.getElementById('project-category');
      var githubEl = document.getElementById('project-github');
      var demoEl = document.getElementById('project-demo');
      var imagePreview = document.getElementById('project-image-preview');
      var imagePlaceholder = document.getElementById('project-image-placeholder');
      var imageInput = document.getElementById('project-image-input');
      var imageDataUrl = '';

      document.getElementById('project-image-btn').addEventListener('click', function () { imageInput.click(); });
      imageInput.addEventListener('change', function (e) {
        var file = e.target && e.target.files[0];
        if (!file || !file.type.match(/^image\//)) return;
        var reader = new FileReader();
        reader.onload = function (ev) {
          imageDataUrl = ev.target && ev.target.result || '';
          if (imageDataUrl) {
            imagePreview.src = imageDataUrl;
            imagePreview.classList.remove('hidden');
            imagePlaceholder.classList.add('hidden');
          }
        };
        reader.readAsDataURL(file);
      });

      function openModal(editItem) {
        imageDataUrl = '';
        imageInput.value = '';
        imagePreview.src = '';
        imagePreview.classList.add('hidden');
        imagePlaceholder.classList.remove('hidden');
        if (editItem) {
          modalTitle.textContent = 'Edit Project';
          idEl.value = editItem.id;
          titleEl.value = editItem.title || '';
          descEl.value = editItem.description || '';
          techEl.value = Array.isArray(editItem.technologies) ? editItem.technologies.join(', ') : (editItem.technologies || '');
          catEl.value = editItem.category || 'web-development';
          githubEl.value = editItem.githubLink || '';
          demoEl.value = editItem.demoLink || '';
          if (editItem.image) {
            imagePreview.src = editItem.image;
            imagePreview.classList.remove('hidden');
            imagePlaceholder.classList.add('hidden');
            imageDataUrl = editItem.image;
          }
        } else {
          modalTitle.textContent = 'Add Project';
          idEl.value = '';
          titleEl.value = descEl.value = techEl.value = githubEl.value = demoEl.value = '';
          catEl.value = 'web-development';
        }
        modal.classList.remove('hidden');
      }
      function closeModal() {
        modal.classList.add('hidden');
      }
      document.getElementById('btn-add').addEventListener('click', function () { openModal(null); });
      document.getElementById('modal-cancel').addEventListener('click', closeModal);
      document.getElementById('modal-backdrop').addEventListener('click', closeModal);

      function escapeHtml(s) {
        if (!s) return '';
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }
      function render() {
        var projects = PortfolioAdmin.getProjects();
        if (projects.length === 0) {
          listEl.innerHTML = '<p class="text-slate-400 py-8 text-center">No projects yet. Click “Add Project” to create one.</p>';
          return;
        }
        listEl.innerHTML = projects.map(function (p) {
          var tech = Array.isArray(p.technologies) ? p.technologies.join(', ') : (p.technologies || '');
          var thumb = p.image ? '<img src="' + escapeHtml(p.image) + '" alt="" class="size-14 rounded-lg object-cover flex-shrink-0"/>' : '<span class="size-14 rounded-lg bg-slate-700 flex items-center justify-center text-slate-500 flex-shrink-0"><span class="material-symbols-outlined">image</span></span>';
          return '<div class="admin-card rounded-xl border border-slate-700 bg-slate-800/40 p-5 flex flex-wrap items-center justify-between gap-4">' +
            '<div class="flex gap-3 min-w-0 flex-1">' + thumb +
            '<div class="min-w-0">' +
            '<h3 class="font-semibold text-white">' + escapeHtml(p.title || 'Untitled') + '</h3>' +
            '<p class="text-slate-500 text-sm mt-1 line-clamp-2">' + escapeHtml((p.description || '').slice(0, 120)) + '</p>' +
            '<p class="text-slate-400 text-xs mt-2">' + escapeHtml(tech.slice(0, 80)) + '</p>' +
            '</div></div>' +
            '<div class="flex gap-2">' +
            '<button type="button" class="edit-project px-3 py-2 rounded-lg bg-slate-700 text-slate-300 hover:bg-primary/30 hover:text-primary transition" data-id="' + escapeHtml(p.id) + '">Edit</button>' +
            '<button type="button" class="delete-project px-3 py-2 rounded-lg bg-red-900/40 text-red-400 hover:bg-red-900/60 transition" data-id="' + escapeHtml(p.id) + '">Delete</button>' +
            '</div>' +
            '</div>';
        }).join('');
        listEl.querySelectorAll('.edit-project').forEach(function (btn) {
          var id = btn.getAttribute('data-id');
          var proj = PortfolioAdmin.getProjects().find(function (p) { return p.id === id; });
          if (proj) btn.addEventListener('click', function () { openModal(proj); });
        });
        listEl.querySelectorAll('.delete-project').forEach(function (btn) {
          var id = btn.getAttribute('data-id');
          btn.addEventListener('click', function () {
            if (confirm('Delete this project?')) {
              var list = PortfolioAdmin.getProjects().filter(function (p) { return p.id !== id; });
              PortfolioAdmin.saveProjects(list);
              render();
            }
          });
        });
      }
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var projects = PortfolioAdmin.getProjects();
        var rawTech = techEl.value.trim();
        var technologies = rawTech ? rawTech.split(',').map(function (t) { return t.trim(); }).filter(Boolean) : [];
        var existing = projects.find(function (p) { return p.id === (idEl.value.trim() || ''); });
        var image = imageDataUrl || (existing && existing.image) || '';
        var item = {
          id: idEl.value.trim() || PortfolioAdmin.nextId(),
          title: titleEl.value.trim(),
          description: descEl.value.trim(),
          technologies: technologies,
          category: catEl.value || 'web-development',
          githubLink: githubEl.value.trim(),
          demoLink: demoEl.value.trim(),
          image: image
        };
        var idx = projects.findIndex(function (p) { return p.id === item.id; });
        if (idx >= 0) projects[idx] = item; else projects.push(item);
        PortfolioAdmin.saveProjects(projects);
        closeModal();
        render();
      });
      document.getElementById('logout-btn').addEventListener('click', function () { PortfolioAdmin.logout(); });
      render();
    })();
  </script>
</body>
</html>
