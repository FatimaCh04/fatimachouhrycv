<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Services | Portfolio Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&amp;display=swap" rel="stylesheet"/>
  <link href="admin.css" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { primary: '#14b8a6', 'background-dark': '#0f172a', sidebar: '#0e1628' },
          fontFamily: { display: ['Inter', 'sans-serif'] }
        }
      }
    };
  </script>
</head>
<body class="bg-background-dark font-display text-slate-100 antialiased min-h-screen">
  <div class="flex">
    <aside class="admin-sidebar fixed inset-y-0 left-0 w-64 bg-sidebar border-r border-slate-700 flex flex-col z-50">
      <div class="p-5 border-b border-slate-700">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-primary text-2xl">admin_panel_settings</span>
          <span class="font-bold text-white">Portfolio Admin</span>
        </div>
      </div>
      <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
        <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition"> <span class="material-symbols-outlined">dashboard</span> Dashboard </a>
        <a href="manage-posts.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition"> <span class="material-symbols-outlined">article</span> Blog Posts </a>
        <a href="manage-projects.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition"> <span class="material-symbols-outlined">folder_open</span> Projects </a>
        <a href="manage-services.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-white bg-primary/20 border-l-4 border-primary"> <span class="material-symbols-outlined">work</span> Services </a>
      </nav>
      <div class="p-3 border-t border-slate-700">
        <button type="button" id="logout-btn" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-red-900/30 hover:text-red-400 transition"><span class="material-symbols-outlined">logout</span> Logout</button>
      </div>
    </aside>
    <main class="flex-1 ml-64 p-8">
      <div class="max-w-4xl">
        <div class="flex flex-wrap items-center justify-between gap-4 mb-8">
          <div>
            <h1 class="text-2xl font-bold text-white">Services</h1>
            <p class="text-slate-400 text-sm mt-1">Manage services offered. Title, description, and price.</p>
          </div>
          <button type="button" id="btn-add" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-primary text-slate-900 font-semibold hover:bg-teal-400 transition">
            <span class="material-symbols-outlined">add</span> Add Service
          </button>
        </div>
        <div id="services-list" class="space-y-4"></div>
      </div>
    </main>
  </div>

  <div id="service-modal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-hidden="true">
    <div class="flex min-h-full items-center justify-center p-4">
      <div class="fixed inset-0 bg-black/60" id="modal-backdrop"></div>
      <div class="relative w-full max-w-lg rounded-2xl border border-slate-700 bg-slate-800 shadow-xl">
        <div class="p-6 border-b border-slate-700">
          <h2 id="modal-title" class="text-xl font-bold text-white">Add Service</h2>
        </div>
        <form id="service-form" class="p-6 space-y-4">
          <input type="hidden" id="service-id"/>
          <div>
            <label for="service-title" class="block text-sm font-medium text-slate-300 mb-1">Title</label>
            <input type="text" id="service-title" required class="w-full px-4 py-2 rounded-xl bg-slate-800 border border-slate-600 text-white focus:border-primary outline-none" placeholder="e.g. Web Development"/>
          </div>
          <div>
            <label for="service-description" class="block text-sm font-medium text-slate-300 mb-1">Description</label>
            <textarea id="service-description" rows="3" class="w-full px-4 py-2 rounded-xl bg-slate-800 border border-slate-600 text-white focus:border-primary outline-none resize-none" placeholder="What you offer"></textarea>
          </div>
          <div>
            <label for="service-price" class="block text-sm font-medium text-slate-300 mb-1">Price (e.g. $35/hour)</label>
            <input type="text" id="service-price" class="w-full px-4 py-2 rounded-xl bg-slate-800 border border-slate-600 text-white focus:border-primary outline-none" placeholder="$40/hour"/>
          </div>
          <div>
            <label for="service-icon" class="block text-sm font-medium text-slate-300 mb-1">Icon (Material name, optional)</label>
            <input type="text" id="service-icon" class="w-full px-4 py-2 rounded-xl bg-slate-800 border border-slate-600 text-white focus:border-primary outline-none" placeholder="code, api, dashboard, smartphone..."/>
          </div>
          <div class="flex gap-3 pt-2">
            <button type="submit" class="flex-1 py-2 rounded-xl bg-primary text-slate-900 font-semibold hover:bg-teal-400 transition">Save</button>
            <button type="button" id="modal-cancel" class="flex-1 py-2 rounded-xl bg-slate-700 text-slate-300 font-medium hover:bg-slate-600 transition">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
  <script>
    (function () {
      if (!PortfolioAdmin.requireAuth()) return;
      var listEl = document.getElementById('services-list');
      var modal = document.getElementById('service-modal');
      var form = document.getElementById('service-form');
      var modalTitle = document.getElementById('modal-title');
      var idEl = document.getElementById('service-id');
      var titleEl = document.getElementById('service-title');
      var descEl = document.getElementById('service-description');
      var priceEl = document.getElementById('service-price');
      var iconEl = document.getElementById('service-icon');

      function openModal(editItem) {
        if (editItem) {
          modalTitle.textContent = 'Edit Service';
          idEl.value = editItem.id;
          titleEl.value = editItem.title || '';
          descEl.value = editItem.description || '';
          priceEl.value = editItem.price || '';
          iconEl.value = editItem.icon || '';
        } else {
          modalTitle.textContent = 'Add Service';
          idEl.value = '';
          titleEl.value = descEl.value = priceEl.value = iconEl.value = '';
        }
        modal.classList.remove('hidden');
      }
      function closeModal() {
        modal.classList.add('hidden');
      }
      document.getElementById('btn-add').addEventListener('click', function () { openModal(null); });
      document.getElementById('modal-cancel').addEventListener('click', closeModal);
      document.getElementById('modal-backdrop').addEventListener('click', closeModal);

      function escapeHtml(s) {
        if (!s) return '';
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }
      function render() {
        var services = PortfolioAdmin.getServices();
        if (services.length === 0) {
          listEl.innerHTML = '<p class="text-slate-400 py-8 text-center">No services yet. Click “Add Service” to create one.</p>';
          return;
        }
        listEl.innerHTML = services.map(function (s) {
          return '<div class="admin-card rounded-xl border border-slate-700 bg-slate-800/40 p-5 flex flex-wrap items-center justify-between gap-4">' +
            '<div class="min-w-0 flex-1">' +
            '<h3 class="font-semibold text-white">' + escapeHtml(s.title || 'Untitled') + '</h3>' +
            '<p class="text-slate-500 text-sm mt-1 line-clamp-2">' + escapeHtml((s.description || '').slice(0, 120)) + '</p>' +
            '<p class="text-primary font-medium text-sm mt-2">' + escapeHtml(s.price || '') + '</p>' +
            '</div>' +
            '<div class="flex gap-2">' +
            '<button type="button" class="edit-service px-3 py-2 rounded-lg bg-slate-700 text-slate-300 hover:bg-primary/30 hover:text-primary transition" data-id="' + escapeHtml(s.id) + '">Edit</button>' +
            '<button type="button" class="delete-service px-3 py-2 rounded-lg bg-red-900/40 text-red-400 hover:bg-red-900/60 transition" data-id="' + escapeHtml(s.id) + '">Delete</button>' +
            '</div>' +
            '</div>';
        }).join('');
        listEl.querySelectorAll('.edit-service').forEach(function (btn) {
          var id = btn.getAttribute('data-id');
          var svc = PortfolioAdmin.getServices().find(function (s) { return s.id === id; });
          if (svc) btn.addEventListener('click', function () { openModal(svc); });
        });
        listEl.querySelectorAll('.delete-service').forEach(function (btn) {
          var id = btn.getAttribute('data-id');
          btn.addEventListener('click', function () {
            if (confirm('Delete this service?')) {
              var list = PortfolioAdmin.getServices().filter(function (s) { return s.id !== id; });
              PortfolioAdmin.saveServices(list);
              render();
            }
          });
        });
      }
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var services = PortfolioAdmin.getServices();
        var item = {
          id: idEl.value.trim() || PortfolioAdmin.nextId(),
          title: titleEl.value.trim(),
          description: descEl.value.trim(),
          price: priceEl.value.trim(),
          icon: iconEl.value.trim()
        };
        var idx = services.findIndex(function (s) { return s.id === item.id; });
        if (idx >= 0) services[idx] = item; else services.push(item);
        PortfolioAdmin.saveServices(services);
        closeModal();
        render();
      });
      document.getElementById('logout-btn').addEventListener('click', function () { PortfolioAdmin.logout(); });
      render();
    })();
  </script>
</body>
</html>
