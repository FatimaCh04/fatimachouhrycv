<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog Posts | Portfolio Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&amp;display=swap" rel="stylesheet"/>
  <link href="admin.css" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { primary: '#14b8a6', 'background-dark': '#0f172a', sidebar: '#0e1628' },
          fontFamily: { display: ['Inter', 'sans-serif'] }
        }
      }
    };
  </script>
</head>
<body class="bg-background-dark font-display text-slate-100 antialiased min-h-screen">
  <div class="flex">
    <aside class="admin-sidebar fixed inset-y-0 left-0 w-64 bg-sidebar border-r border-slate-700 flex flex-col z-50">
      <div class="p-5 border-b border-slate-700">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-primary text-2xl">admin_panel_settings</span>
          <span class="font-bold text-white">Portfolio Admin</span>
        </div>
      </div>
      <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
        <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition"> <span class="material-symbols-outlined">dashboard</span> Dashboard </a>
        <a href="manage-posts.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-white bg-primary/20 border-l-4 border-primary"> <span class="material-symbols-outlined">article</span> Blog Posts </a>
        <a href="manage-projects.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition"> <span class="material-symbols-outlined">folder_open</span> Projects </a>
        <a href="manage-services.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition"> <span class="material-symbols-outlined">work</span> Services </a>
      </nav>
      <div class="p-3 border-t border-slate-700">
        <button type="button" id="logout-btn" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-red-900/30 hover:text-red-400 transition"><span class="material-symbols-outlined">logout</span> Logout</button>
      </div>
    </aside>
    <main class="flex-1 ml-64 p-8">
      <div class="max-w-4xl">
        <div class="flex flex-wrap items-center justify-between gap-4 mb-8">
          <div>
            <h1 class="text-2xl font-bold text-white">Blog Posts</h1>
            <p class="text-slate-400 text-sm mt-1">Add, edit, or delete posts. Data is stored in localStorage.</p>
          </div>
          <button type="button" id="btn-add" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-primary text-slate-900 font-semibold hover:bg-teal-400 transition">
            <span class="material-symbols-outlined">add</span> Add Post
          </button>
        </div>

        <div id="posts-list" class="space-y-4"></div>
      </div>
    </main>
  </div>

  <!-- Modal: Add/Edit Post -->
  <div id="post-modal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-hidden="true">
    <div class="flex min-h-full items-center justify-center p-4">
      <div class="fixed inset-0 bg-black/60" id="modal-backdrop"></div>
      <div class="relative w-full max-w-lg rounded-2xl border border-slate-700 bg-slate-800 shadow-xl">
        <div class="p-6 border-b border-slate-700">
          <h2 id="modal-title" class="text-xl font-bold text-white">Add Post</h2>
        </div>
        <form id="post-form" class="p-6 space-y-4">
          <input type="hidden" id="post-id"/>
          <div>
            <label for="post-title" class="block text-sm font-medium text-slate-300 mb-1">Title</label>
            <input type="text" id="post-title" required class="w-full px-4 py-2 rounded-xl bg-slate-800 border border-slate-600 text-white focus:border-primary outline-none" placeholder="Post title"/>
          </div>
          <div>
            <label for="post-date" class="block text-sm font-medium text-slate-300 mb-1">Date</label>
            <input type="date" id="post-date" required class="w-full px-4 py-2 rounded-xl bg-slate-800 border border-slate-600 text-white focus:border-primary outline-none"/>
          </div>
          <div>
            <label for="post-description" class="block text-sm font-medium text-slate-300 mb-1">Description (short)</label>
            <textarea id="post-description" rows="2" class="w-full px-4 py-2 rounded-xl bg-slate-800 border border-slate-600 text-white focus:border-primary outline-none resize-none" placeholder="Brief description"></textarea>
          </div>
          <div>
            <label for="post-content" class="block text-sm font-medium text-slate-300 mb-1">Content</label>
            <textarea id="post-content" rows="5" class="w-full px-4 py-2 rounded-xl bg-slate-800 border border-slate-600 text-white focus:border-primary outline-none resize-y" placeholder="Full content (plain text or HTML)"></textarea>
          </div>
          <div class="flex gap-3 pt-2">
            <button type="submit" class="flex-1 py-2 rounded-xl bg-primary text-slate-900 font-semibold hover:bg-teal-400 transition">Save</button>
            <button type="button" id="modal-cancel" class="flex-1 py-2 rounded-xl bg-slate-700 text-slate-300 font-medium hover:bg-slate-600 transition">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
  <script>
    (function () {
      if (!PortfolioAdmin.requireAuth()) return;
      var listEl = document.getElementById('posts-list');
      var modal = document.getElementById('post-modal');
      var form = document.getElementById('post-form');
      var modalTitle = document.getElementById('modal-title');
      var postId = document.getElementById('post-id');
      var postTitle = document.getElementById('post-title');
      var postDate = document.getElementById('post-date');
      var postDesc = document.getElementById('post-description');
      var postContent = document.getElementById('post-content');

      function openModal(editItem) {
        if (editItem) {
          modalTitle.textContent = 'Edit Post';
          postId.value = editItem.id;
          postTitle.value = editItem.title || '';
          postDate.value = editItem.date || '';
          postDesc.value = editItem.description || '';
          postContent.value = editItem.content || '';
        } else {
          modalTitle.textContent = 'Add Post';
          postId.value = '';
          postDate.value = new Date().toISOString().slice(0, 10);
          postTitle.value = postDesc.value = postContent.value = '';
        }
        modal.classList.remove('hidden');
      }
      function closeModal() {
        modal.classList.add('hidden');
      }
      document.getElementById('btn-add').addEventListener('click', function () { openModal(null); });
      document.getElementById('modal-cancel').addEventListener('click', closeModal);
      document.getElementById('modal-backdrop').addEventListener('click', closeModal);

      function render() {
        var posts = PortfolioAdmin.getBlogPosts();
        if (posts.length === 0) {
          listEl.innerHTML = '<p class="text-slate-400 py-8 text-center">No posts yet. Click “Add Post” to create one.</p>';
          return;
        }
        listEl.innerHTML = posts.map(function (p) {
          return '<div class="admin-card rounded-xl border border-slate-700 bg-slate-800/40 p-5 flex flex-wrap items-center justify-between gap-4">' +
            '<div class="min-w-0 flex-1">' +
            '<h3 class="font-semibold text-white truncate">' + escapeHtml(p.title || 'Untitled') + '</h3>' +
            '<p class="text-slate-400 text-sm mt-0.5">' + escapeHtml(p.date || '') + '</p>' +
            '<p class="text-slate-500 text-sm mt-1 line-clamp-2">' + escapeHtml((p.description || '').slice(0, 120)) + '</p>' +
            '</div>' +
            '<div class="flex gap-2">' +
            '<button type="button" class="edit-post px-3 py-2 rounded-lg bg-slate-700 text-slate-300 hover:bg-primary/30 hover:text-primary transition" data-id="' + escapeHtml(p.id) + '">Edit</button>' +
            '<button type="button" class="delete-post px-3 py-2 rounded-lg bg-red-900/40 text-red-400 hover:bg-red-900/60 transition" data-id="' + escapeHtml(p.id) + '">Delete</button>' +
            '</div>' +
            '</div>';
        }).join('');
        listEl.querySelectorAll('.edit-post').forEach(function (btn) {
          var id = btn.getAttribute('data-id');
          var post = PortfolioAdmin.getBlogPosts().find(function (p) { return p.id === id; });
          if (post) btn.addEventListener('click', function () { openModal(post); });
        });
        listEl.querySelectorAll('.delete-post').forEach(function (btn) {
          var id = btn.getAttribute('data-id');
          btn.addEventListener('click', function () {
            if (confirm('Delete this post?')) {
              var posts = PortfolioAdmin.getBlogPosts().filter(function (p) { return p.id !== id; });
              PortfolioAdmin.saveBlogPosts(posts);
              render();
            }
          });
        });
      }
      function escapeHtml(s) {
        if (!s) return '';
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var posts = PortfolioAdmin.getBlogPosts();
        var id = postId.value.trim();
        var item = {
          id: id || PortfolioAdmin.nextId(),
          title: postTitle.value.trim(),
          date: postDate.value.trim(),
          description: postDesc.value.trim(),
          content: postContent.value.trim()
        };
        var idx = posts.findIndex(function (p) { return p.id === item.id; });
        if (idx >= 0) posts[idx] = item; else posts.unshift(item);
        PortfolioAdmin.saveBlogPosts(posts);
        closeModal();
        render();
      });

      document.getElementById('logout-btn').addEventListener('click', function () { PortfolioAdmin.logout(); });
      render();
    })();
  </script>
</body>
</html>
